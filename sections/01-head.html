<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SUNG I — 45+ years of precision plastic injection molding. OEM/ODM partner for global industries. Request a quote today.">
  <title>SUNG I | Precision Plastic Injection Molding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0F1B2D',
            'primary-light': '#1B2838',
            accent: '#C8A84E',
            'accent-hover': '#D4B85E',
            'bg-alt': '#F8FAFC',
            foreground: '#1E293B',
            muted: '#64748B',
          },
          fontFamily: {
            heading: ['Lexend', 'Noto Sans TC', 'Noto Sans JP', 'sans-serif'],
            body: ['Source Sans 3', 'Noto Sans TC', 'Noto Sans JP', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --duration-instant: 150ms;
      --duration-state: 250ms;
      --duration-entrance: 600ms;
    }
    html { font-family: 'Source Sans 3', 'Noto Sans TC', 'Noto Sans JP', sans-serif; }
    .font-heading { font-family: 'Lexend', 'Noto Sans TC', 'Noto Sans JP', sans-serif; }
    /* Skip link */
    .skip-link { position: absolute; top: -100%; left: 1rem; z-index: 100; padding: 0.75rem 1.5rem; background: #C8A84E; color: #0F1B2D; font-weight: 600; border-radius: 0 0 0.5rem 0.5rem; transition: top 0.2s; }
    .skip-link:focus { top: 0; }
    /* Focus visible */
    *:focus-visible { outline: 2px solid #C8A84E; outline-offset: 2px; border-radius: 2px; }
    /* Reveal animation */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity var(--duration-entrance) var(--ease-out-quart), transform var(--duration-entrance) var(--ease-out-quart); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    /* Card hover */
    .cap-card { transition: transform var(--duration-state) var(--ease-out-quart), box-shadow var(--duration-state) var(--ease-out-quart), border-color var(--duration-state); border-top: 3px solid transparent; }
    .cap-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(15,27,45,0.1); border-top-color: #C8A84E; }
    /* Industry card overlay */
    .ind-card .ind-overlay { background: linear-gradient(180deg, rgba(15,27,45,0.3) 0%, rgba(15,27,45,0.75) 100%); transition: opacity 300ms var(--ease-out-quart); }
    .ind-card:hover .ind-overlay { opacity: 0.5; }
    .ind-card .ind-explore { opacity: 0; transform: translateY(8px); transition: all 300ms var(--ease-out-quart); }
    .ind-card:hover .ind-explore { opacity: 1; transform: translateY(0); }
    /* Timeline */
    .tl-step { opacity: 0.35; transition: opacity 400ms var(--ease-out-quart); }
    .tl-step.active { opacity: 1; }
    /* Nav link */
    .nav-link { position: relative; }
    .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #C8A84E; transition: width 200ms var(--ease-out-quart); }
    .nav-link.active::after, .nav-link:hover::after { width: 100%; }
    /* Hamburger */
    .hamburger span { display: block; width: 24px; height: 2px; background: #fff; transition: transform 300ms var(--ease-out-quart), opacity 200ms; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    /* Mobile menu */
    .mobile-menu { transform: translateX(100%); transition: transform 400ms var(--ease-out-quart); }
    .mobile-menu.open { transform: translateX(0); }
    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      .cap-card, .ind-card .ind-overlay, .ind-card .ind-explore, .tl-step, .nav-link::after, .hamburger span, .mobile-menu { transition: none !important; }
      .tl-step { opacity: 1; }
    }
    /* Button base */
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; min-width: 44px; font-weight: 600; border-radius: 0.5rem; transition: background var(--duration-instant), transform var(--duration-instant); }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
  </style>
</head>
<body class="bg-white text-foreground antialiased">
