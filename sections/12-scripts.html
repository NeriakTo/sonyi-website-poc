<!-- ========== JAVASCRIPT ========== -->
<script>
(function(){
  'use strict';
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // === Mobile Menu ===
  const hamburger = document.getElementById('hamburger-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  const mobileLinks = mobileMenu.querySelectorAll('a');
  let menuOpen = false;

  function toggleMenu(open) {
    menuOpen = typeof open === 'boolean' ? open : !menuOpen;
    hamburger.classList.toggle('open', menuOpen);
    hamburger.setAttribute('aria-expanded', menuOpen);
    mobileMenu.classList.toggle('open', menuOpen);
    mobileMenu.setAttribute('aria-hidden', !menuOpen);
    document.body.style.overflow = menuOpen ? 'hidden' : '';
  }

  hamburger.addEventListener('click', () => toggleMenu());
  mobileLinks.forEach(link => link.addEventListener('click', () => toggleMenu(false)));
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && menuOpen) toggleMenu(false); });

  // === Reveal on Scroll ===
  if (!prefersReducedMotion) {
    const revealEls = document.querySelectorAll('.reveal');
    const revealObs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });
    }, { threshold: 0.15 });
    revealEls.forEach(el => revealObs.observe(el));
  } else {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
  }

  // === Count-Up Animation ===
  const countEls = document.querySelectorAll('.count-up');
  const countObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      const target = parseFloat(el.dataset.target);
      const suffix = el.dataset.suffix || '+';
      const decimal = parseInt(el.dataset.decimal) || 0;
      const duration = prefersReducedMotion ? 0 : 2000;
      const start = performance.now();
      function update(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = eased * target;
        el.textContent = (decimal > 0 ? current.toFixed(decimal) : Math.floor(current).toLocaleString()) + suffix;
        if (progress < 1) requestAnimationFrame(update);
      }
      if (duration === 0) { el.textContent = (decimal > 0 ? target.toFixed(decimal) : target.toLocaleString()) + suffix; }
      else requestAnimationFrame(update);
      countObs.unobserve(el);
    });
  }, { threshold: 0.5 });
  countEls.forEach(el => countObs.observe(el));

  // === Timeline Steps ===
  const tlSteps = document.querySelectorAll('.tl-step');
  if (!prefersReducedMotion && tlSteps.length) {
    let timelineTriggered = false;
    const tlObs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting || timelineTriggered) return;
        timelineTriggered = true;
        tlSteps.forEach((s, i) => setTimeout(() => s.classList.add('active'), i * 400));
      });
    }, { threshold: 0.2 });
    const timelineSection = document.getElementById('workflow');
    if (timelineSection) tlObs.observe(timelineSection);
  } else {
    tlSteps.forEach(s => s.classList.add('active'));
  }

  // === Active Nav on Scroll ===
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('.nav-link');
  const navObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + id));
      }
    });
  }, { threshold: 0.3, rootMargin: '-72px 0px -50% 0px' });
  sections.forEach(s => navObs.observe(s));

})();
</script>
</body>
</html>
